<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — HarvestBridge</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
<nav class="navbar"><a href="/" class="nav-logo"><span class="logo-icon">🌾</span>Harvest<span>Bridge</span></a><div class="nav-auth" id="nav-auth"></div></nav>

<div class="auth-page">
  <div class="auth-card">
    <div class="logo" style="font-family:'Playfair Display',serif;font-size:1.5rem;font-weight:800;color:var(--green);text-align:center;margin-bottom:0.5rem;">🌾 HarvestBridge</div>
    <h2>Welcome Back</h2>
    <p class="subtitle-text">Login to your account</p>

    <form id="login-form" style="display:flex;flex-direction:column;gap:1.25rem;">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter your password" required>
      </div>
      <div id="error-msg" class="form-error" style="display:none;"></div>
      <button type="submit" class="btn btn-green btn-full btn-lg" id="login-btn">Login</button>
    </form>

    <p style="text-align:center;margin-top:1.5rem;color:var(--text-light);">
      Don't have an account? <a href="/register.html" style="color:var(--green);font-weight:600;">Register here</a>
    </p>
  </div>
</div>

<script src="/js/api.js"></script>
<script>
  // Redirect if already logged in
  if (getUser()) {
    window.location.href = getRole() === 'farmer' ? '/farmer-dashboard.html' : '/business-dashboard.html';
  }

  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('login-btn');
    const errEl = document.getElementById('error-msg');
    btn.textContent = 'Logging in...'; btn.disabled = true;
    errEl.style.display = 'none';

    try {
      const data = await apiFetch('/auth/login', {
        method: 'POST',
        body: { email: document.getElementById('email').value, password: document.getElementById('password').value }
      });
      setAuth(data);
      showToast(`Welcome back, ${data.name}!`);
      setTimeout(() => {
        window.location.href = data.role === 'farmer' ? '/farmer-dashboard.html' : '/marketplace.html';
      }, 800);
    } catch (err) {
      errEl.textContent = err.message;
      errEl.style.display = 'block';
      btn.textContent = 'Login'; btn.disabled = false;
    }
  });
</script>
</body>
</html>
