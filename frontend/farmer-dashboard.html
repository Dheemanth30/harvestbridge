<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Farmer Dashboard — HarvestBridge</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
<nav class="navbar">
  <a href="/" class="nav-logo"><span class="logo-icon">🌾</span>Harvest<span>Bridge</span></a>
  <div class="nav-auth" id="nav-auth"></div>
</nav>

<div class="dashboard-layout">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-title">Navigation</div>
    <nav class="sidebar-nav">
      <a href="#" class="sidebar-link active" onclick="showTab('products')" id="link-products"><span class="icon">🌾</span>My Products</a>
      <a href="#" class="sidebar-link" onclick="showTab('orders')" id="link-orders"><span class="icon">📦</span>Orders</a>
      <a href="#" class="sidebar-link" onclick="showTab('earnings')" id="link-earnings"><span class="icon">💰</span>Earnings</a>
    </nav>
    <div class="sidebar-title">Account</div>
    <nav class="sidebar-nav">
      <a href="/marketplace.html" class="sidebar-link"><span class="icon">🛍️</span>Marketplace</a>
      <a href="#" class="sidebar-link" onclick="logout()"><span class="icon">🚪</span>Logout</a>
    </nav>
  </aside>

  <!-- Main -->
  <main class="dashboard-main">
    <!-- Products Tab -->
    <div id="tab-products">
      <div class="dashboard-header" style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem;">
        <div><h2>My Products</h2><p>Manage your product listings</p></div>
        <button class="btn btn-primary" onclick="openAddModal()">+ Add New Product</button>
      </div>
      <div class="grid-3" id="my-products-grid">
        <div class="loading" style="grid-column:1/-1;"><div class="spinner"></div></div>
      </div>
    </div>

    <!-- Orders Tab -->
    <div id="tab-orders" style="display:none;">
      <div class="dashboard-header"><h2>Received Orders</h2><p>Manage and update order statuses</p></div>
      <div id="orders-list"><div class="loading"><div class="spinner"></div></div></div>
    </div>

    <!-- Earnings Tab -->
    <div id="tab-earnings" style="display:none;">
      <div class="dashboard-header"><h2>Earnings Overview</h2></div>
      <div class="stats-grid" id="earnings-stats"></div>
    </div>
  </main>
</div>

<!-- Add / Edit Product Modal -->
<div class="modal-overlay" id="product-modal">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modal-title">Add Product</h3>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <form id="product-form" style="display:flex;flex-direction:column;gap:1rem;">
      <input type="hidden" id="edit-product-id">
      <div class="form-row">
        <div class="form-group"><label>Product Name *</label><input id="p-name" type="text" required placeholder="e.g., Fresh Tomatoes"></div>
        <div class="form-group">
          <label>Category *</label>
          <select id="p-category">
            <option value="Vegetables">🥦 Vegetables</option>
            <option value="Fruits">🍎 Fruits</option>
            <option value="Grains">🌾 Grains</option>
            <option value="Dairy">🥛 Dairy</option>
            <option value="Spices">🌶️ Spices</option>
            <option value="Other">📦 Other</option>
          </select>
        </div>
      </div>
      <div class="form-group"><label>Description</label><textarea id="p-desc" placeholder="Describe your product..."></textarea></div>
      <div class="form-row">
        <div class="form-group"><label>Price per Unit (₹) *</label><input id="p-price" type="number" step="0.01" required placeholder="0.00"></div>
        <div class="form-group">
          <label>Unit *</label>
          <select id="p-unit">
            <option value="kg">kg</option><option value="litre">litre</option>
            <option value="dozen">dozen</option><option value="piece">piece</option>
            <option value="quintal">quintal</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Available Quantity *</label><input id="p-qty" type="number" step="0.1" required placeholder="0"></div>
        <div class="form-group"><label>Min Order Qty *</label><input id="p-minqty" type="number" step="0.1" value="1" required placeholder="1"></div>
      </div>
      <div style="display:flex;align-items:center;gap:0.75rem;">
        <input type="checkbox" id="p-organic" style="width:18px;height:18px;accent-color:var(--green);">
        <label for="p-organic" style="cursor:pointer;font-weight:600;">🌿 Organic Certified</label>
      </div>
      <div class="form-group">
        <label>Product Image</label>
        <div class="upload-area" id="upload-area" onclick="document.getElementById('p-image').click()">
          <input type="file" id="p-image" accept="image/*" onchange="previewImage(event)">
          <div id="upload-placeholder">📸 Click to upload product image</div>
          <img id="image-preview" class="upload-preview" style="display:none;">
        </div>
      </div>
      <div id="form-error" class="form-error" style="display:none;"></div>
      <button type="submit" class="btn btn-green btn-full" id="submit-btn">Save Product</button>
    </form>
  </div>
</div>

<script src="/js/api.js"></script>
<script>
  if (!requireAuth('farmer')) {}

  let myOrders = [];

  function showTab(tab) {
    ['products', 'orders', 'earnings'].forEach(t => {
      document.getElementById(`tab-${t}`).style.display = t === tab ? 'block' : 'none';
      document.getElementById(`link-${t}`)?.classList.toggle('active', t === tab);
    });
    if (tab === 'orders') loadOrders();
    if (tab === 'earnings') loadEarnings();
  }

  // ── Products ──────────────────────────────────────────────────────────────
  async function loadProducts() {
    try {
      const products = await apiFetch('/products/mine');
      const grid = document.getElementById('my-products-grid');
      if (!products.length) {
        grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">🌾</div><h3>No products yet</h3><p>Add your first product to start receiving orders.</p></div>`;
        return;
      }
      grid.innerHTML = products.map(p => `
        <div class="card product-card" id="pc-${p.id}">
          <div class="card-image">
            ${p.image_path ? `<img src="${p.image_path}" alt="${p.name}">` : `<div class="placeholder">${categoryEmoji(p.category)}</div>`}
            <div class="badges"><span class="badge badge-category">${p.category}</span>${p.is_organic ? '<span class="badge badge-organic">🌿</span>' : ''}</div>
          </div>
          <div class="card-body">
            <div class="product-name">${p.name}</div>
            <div class="price-row">
              <div><span class="price">${fmtCurrency(p.price_per_unit)}</span><span class="unit">/${p.unit}</span></div>
              <div style="display:flex;gap:0.5rem;">
                <button class="btn btn-outline btn-sm" onclick="openEditModal(${p.id})">✏️</button>
                <button class="btn btn-danger btn-sm" onclick="deleteProduct(${p.id})">🗑️</button>
              </div>
            </div>
            <div class="min-order" style="margin-top:0.5rem;">Stock: ${p.quantity_available} ${p.unit} · Min: ${p.min_order_qty} ${p.unit}</div>
          </div>
        </div>`).join('');
    } catch (err) { showToast(err.message, 'error'); }
  }

  function openAddModal() {
    document.getElementById('modal-title').textContent = 'Add New Product';
    document.getElementById('product-form').reset();
    document.getElementById('edit-product-id').value = '';
    document.getElementById('image-preview').style.display = 'none';
    document.getElementById('upload-placeholder').style.display = 'block';
    document.getElementById('product-modal').classList.add('open');
  }

  async function openEditModal(productId) {
    try {
      const p = await apiFetch(`/products/${productId}`);
      document.getElementById('modal-title').textContent = 'Edit Product';
      document.getElementById('edit-product-id').value = p.id;
      document.getElementById('p-name').value = p.name;
      document.getElementById('p-category').value = p.category;
      document.getElementById('p-desc').value = p.description || '';
      document.getElementById('p-price').value = p.price_per_unit;
      document.getElementById('p-unit').value = p.unit;
      document.getElementById('p-qty').value = p.quantity_available;
      document.getElementById('p-minqty').value = p.min_order_qty;
      document.getElementById('p-organic').checked = p.is_organic;
      if (p.image_path) {
        document.getElementById('image-preview').src = p.image_path;
        document.getElementById('image-preview').style.display = 'block';
        document.getElementById('upload-placeholder').style.display = 'none';
      }
      document.getElementById('product-modal').classList.add('open');
    } catch (err) { showToast(err.message, 'error'); }
  }

  function closeModal() { document.getElementById('product-modal').classList.remove('open'); }

  function previewImage(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      document.getElementById('image-preview').src = ev.target.result;
      document.getElementById('image-preview').style.display = 'block';
      document.getElementById('upload-placeholder').style.display = 'none';
    };
    reader.readAsDataURL(file);
  }

  document.getElementById('product-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('submit-btn');
    const errEl = document.getElementById('form-error');
    btn.textContent = 'Saving...'; btn.disabled = true;
    errEl.style.display = 'none';

    const fd = new FormData();
    fd.append('name', document.getElementById('p-name').value);
    fd.append('category', document.getElementById('p-category').value);
    fd.append('description', document.getElementById('p-desc').value);
    fd.append('price_per_unit', document.getElementById('p-price').value);
    fd.append('unit', document.getElementById('p-unit').value);
    fd.append('quantity_available', document.getElementById('p-qty').value);
    fd.append('min_order_qty', document.getElementById('p-minqty').value);
    fd.append('is_organic', document.getElementById('p-organic').checked);
    const imgFile = document.getElementById('p-image').files[0];
    if (imgFile) fd.append('image', imgFile);

    const editId = document.getElementById('edit-product-id').value;
    try {
      if (editId) {
        await apiFetch(`/products/${editId}`, { method: 'PUT', body: fd, headers: {} });
        showToast('Product updated! ✅');
      } else {
        await apiFetch('/products/', { method: 'POST', body: fd, headers: {} });
        showToast('Product added! 🌾');
      }
      closeModal();
      loadProducts();
    } catch (err) {
      errEl.textContent = err.message;
      errEl.style.display = 'block';
    }
    btn.textContent = 'Save Product'; btn.disabled = false;
  });

  async function deleteProduct(id) {
    if (!confirm('Delete this product?')) return;
    try {
      await apiFetch(`/products/${id}`, { method: 'DELETE' });
      showToast('Product deleted');
      loadProducts();
    } catch (err) { showToast(err.message, 'error'); }
  }

  // ── Orders ────────────────────────────────────────────────────────────────
  async function loadOrders() {
    try {
      myOrders = await apiFetch('/orders/mine');
      const el = document.getElementById('orders-list');
      if (!myOrders.length) {
        el.innerHTML = `<div class="empty-state"><div class="empty-icon">📦</div><h3>No orders yet</h3><p>Orders from businesses will appear here.</p></div>`;
        return;
      }
      el.innerHTML = myOrders.map(o => `
        <div class="order-card">
          <div class="order-header">
            <div>
              <div class="order-id">Order #${o.id}</div>
              <div class="order-meta">${fmtDate(o.created_at)} · ${o.business_name || 'Business'}</div>
            </div>
            <div style="display:flex;gap:0.5rem;flex-wrap:wrap;align-items:center;">
              <span class="status-badge status-${o.payment_status}">${o.payment_status === 'paid' ? '✅ Paid' : '❌ Unpaid'}</span>
              <select class="status-badge" onchange="updateStatus(${o.id}, this.value)" style="border:2px solid var(--border);border-radius:100px;padding:0.3rem 0.6rem;font-size:0.8rem;font-weight:600;background:white;cursor:pointer;">
                ${['pending','confirmed','packed','shipped','delivered'].map(s => `<option value="${s}" ${o.status===s?'selected':''}>${s.charAt(0).toUpperCase()+s.slice(1)}</option>`).join('')}
              </select>
            </div>
          </div>
          <div class="order-body">
            <div>
              ${o.items.map(i => `<p style="font-size:0.9rem;color:var(--text-mid);">📦 ${i.product_name} × ${i.quantity} — ${fmtCurrency(i.unit_price * i.quantity)}</p>`).join('')}
              <p style="font-size:0.85rem;color:var(--text-light);margin-top:0.5rem;">📍 ${o.delivery_address}</p>
            </div>
            <div class="order-amount">${fmtCurrency(o.total_amount)}</div>
          </div>
        </div>`).join('');
    } catch (err) { showToast(err.message, 'error'); }
  }

  async function updateStatus(orderId, newStatus) {
    try {
      await apiFetch(`/orders/${orderId}/status`, { method: 'PUT', body: { status: newStatus } });
      showToast(`Order updated to "${newStatus}" ✅`);
    } catch (err) { showToast(err.message, 'error'); loadOrders(); }
  }

  // ── Earnings ──────────────────────────────────────────────────────────────
  async function loadEarnings() {
    try {
      const orders = await apiFetch('/orders/mine');
      const paid = orders.filter(o => o.payment_status === 'paid');
      const total = paid.reduce((s, o) => s + o.total_amount, 0);
      const pending = orders.filter(o => o.payment_status === 'unpaid').reduce((s, o) => s + o.total_amount, 0);
      document.getElementById('earnings-stats').innerHTML = `
        <div class="stat-card"><div class="stat-icon green">💰</div><div class="stat-info"><div class="num">${fmtCurrency(total)}</div><div class="label">Total Earned</div></div></div>
        <div class="stat-card"><div class="stat-icon amber">⏳</div><div class="stat-info"><div class="num">${fmtCurrency(pending)}</div><div class="label">Pending Payment</div></div></div>
        <div class="stat-card"><div class="stat-icon blue">📦</div><div class="stat-info"><div class="num">${orders.length}</div><div class="label">Total Orders</div></div></div>
        <div class="stat-card"><div class="stat-icon green">✅</div><div class="stat-info"><div class="num">${paid.length}</div><div class="label">Paid Orders</div></div></div>`;
    } catch (err) { showToast(err.message, 'error'); }
  }

  // Close modal on overlay click
  document.getElementById('product-modal').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });

  loadProducts();
</script>
</body>
</html>
